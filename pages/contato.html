<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../assets/favicon.png">
    <title>Contato</title>
    <link rel="stylesheet" href="../styles/index.css">
    <br>
    <h1>Contato</h1>
    <br>
     <script src="../components/script.js"></script>
     <div id="menu-container"></div>
     <br>
</head>
<body>
    <main>
     <p>Obrigada por visitar meu espaço! Valorizo muito cada contato e estou aberta a ouvir sobre novas ideias. 
        Use o formulário abaixo para entrar em contato — será um prazer conhecer sua história ou colaborar com seu próximo projeto.</p>
<br>
<form action="destino.html" method="get" name="formulário" id="formulario">
<label for="nome">Nome:</label>
<input type="text" name="nome" id="nome" required>
<label for="sobrenome">Sobrenome:</label>
<input type="text" name="sobrenome" id="sobrenome" required><br>
<label for="email">E-mail:</label>
<input type="email" name="e-mail" id="email" placeholder="seuemail@exemplo.com" required><br>
<label for="telefone">Telefone:</label>
<input type="tel" name="telefone" id="telefone" required><br>
<label for="mensagem">Mensagem:</label><br>
<textarea name="mensagem" id="mensagem" cols="30" rows="10" required></textarea><br>
<input type="submit" value="Enviar" id="enviar"><!---botão de enviar formulário-->
<input type="reset" value="Limpar" id="limpar"><!---botão de limpar formulário-->
</form>
<br>
</main>
<br>
<footer>
    <div id="footer-container"></div> <!-- colocando o footer aqui-->
</footer>
</body>
</html>
